<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard E-commerce · Grupo Oscar</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0f1e;color:#f1f5f9;font-family:'Inter',-apple-system,sans-serif;padding:20px;min-height:100vh}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#334155;border-radius:99px}
.topo{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.titulo{font-size:20px;font-weight:800;color:#fff}
.sub{font-size:12px;color:#64748b;margin-top:3px}
.badge{border-radius:20px;padding:3px 12px;font-size:11px;font-weight:700}
.badge-g{background:#16a34a22;color:#4ade80;border:1px solid #16a34a44}
.badge-b{background:#6366f122;color:#a5b4fc;border:1px solid #6366f144}
.btn{background:#B91C1C;color:#fff;border:none;border-radius:8px;padding:9px 20px;cursor:pointer;font-size:13px;font-weight:700}
.btn:hover{opacity:.85}
.tab-row{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.tab{padding:7px 16px;border-radius:99px;font-size:12px;font-weight:600;cursor:pointer;border:none}
.tab.on{background:#B91C1C;color:#fff}
.tab.off{background:rgba(255,255,255,0.06);color:#94a3b8}
.sl{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px;margin-top:4px}
.alerta{background:rgba(185,28,28,0.08);border:1px solid rgba(185,28,28,0.25);border-radius:14px;padding:16px 20px;margin-bottom:22px}
.g3{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:24px}
.g2{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;margin-bottom:24px}
.kpi{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:18px 20px}
.card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:18px 20px;margin-bottom:20px}
.sec{display:none}
.sec.on{display:block}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:18px}
.spin{width:48px;height:48px;border:3px solid rgba(185,28,28,0.2);border-top:3px solid #B91C1C;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.pulse{animation:pulse 1.5s ease infinite}
.rodape{margin-top:28px;text-align:center;font-size:11px;color:#334155}
table.t{width:100%;border-collapse:collapse;font-size:12px}
table.t th{background:rgba(99,102,241,0.12);color:#a5b4fc;padding:9px 12px;text-align:left;font-weight:600;border-bottom:1px solid rgba(255,255,255,0.06);white-space:nowrap}
table.t td{padding:8px 12px;border-bottom:1px solid rgba(255,255,255,0.04);color:#cbd5e1}
@media(max-width:600px){body{padding:12px}.titulo{font-size:16px}}
</style>
</head>
<body>

<!-- SENHA -->
<div id="login" style="display:flex;align-items:center;justify-content:center;min-height:100vh">
  <div style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:40px;width:100%;max-width:380px;text-align:center">
    <div style="font-size:40px;margin-bottom:16px">📊</div>
    <div style="font-size:20px;font-weight:800;color:#fff;margin-bottom:6px">Dashboard E-commerce</div>
    <div style="font-size:13px;color:#64748b;margin-bottom:28px">Grupo Oscar · Acesso Restrito</div>
    <input id="pwd" type="password" placeholder="Digite a senha"
      style="width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:12px 16px;color:#f1f5f9;font-size:14px;outline:none;margin-bottom:12px"
      onkeydown="if(event.key==='Enter')auth()"/>
    <div id="erropwd" style="color:#f87171;font-size:12px;margin-bottom:12px;display:none">Senha incorreta.</div>
    <button onclick="auth()" style="width:100%;background:#B91C1C;color:#fff;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:700;cursor:pointer">Entrar</button>
  </div>
</div>

<div id="app" style="display:none">
  <div id="loading" class="loading">
    <div class="spin"></div>
    <div style="text-align:center">
      <div style="font-size:15px;font-weight:600;color:#e2e8f0">Carregando Dashboard E-commerce</div>
      <div id="lmsg" class="pulse" style="font-size:12px;color:#475569;margin-top:6px">Conectando...</div>
    </div>
  </div>
  <div id="main" style="display:none"></div>
</div>

<script>
const KEY = "AIzaSyAC0G7Bnnaev84dgzCx6n9GKoKAsFZrFmM";
const SID = "1J7jSMjAbD8RtKbKRzWOaEuy3K-sThifDDS_y7sMLUzw";

// COLUNAS EXATAS baseadas nos PDFs exportados da planilha
// Aba Diarização Canal Faturamento
const FC = {
  DATA:1, DIA:2, PCT_DIAR:3,
  CMV_CD:4, CMV_LOJAS:5, CMV_GERAL:6, MARGEM:7,
  META_GERAL:8,      // I - Meta GERAL
  REAL_ACUM:9,       // J - Faturamento Realizado Acumulado  
  PCT_ACUM:10,       // K - % Realizado Acumulado
  DIF_PCT:11,        // L - Diferença %
  TENDENCIA:12,      // M - Tendência
  VENDA_ACUM:13,     // N - Venda acumulada
  TX_CONV:14,        // O - TX conversão
  FAROL:15,          // P - Farol
  TICKET:16,         // Q - Ticket Médio
  META_CD:17,        // R - Meta CD (índice 17 = coluna R... vamos buscar direto)
};

// Aba Diarização Canal Vendas
const VC = {
  DATA:1, DIA:2, PCT_DIAR:3,
  META_GERAL:4,      // E - Meta GERAL Vendas
  REAL_ACUM:5,       // F - Realizado Acumulado
  PCT_ACUM:6,        // G - % Realizado
  DIF_PCT:7,         // H - Diferença %
  TENDENCIA:8,       // I - Tendência
  VENDA_ACUM:9,      // J - Venda acumulada
  // Canais
  META_30:11,   REAL_30:12,   PCT_30:13,    // 3.0 Vendas
  META_OUT:16,  REAL_OUT:17,  PCT_OUT:18,   // OUT Marketplace
  META_APP:21,  REAL_APP:22,  PCT_APP:23,   // App Oscar
  META_SITE:26, REAL_SITE:27, PCT_SITE:28,  // Site Oscar (1p+3p)
  META_PAQ:31,  REAL_PAQ:32,  PCT_PAQ:33,   // Paquetá Calçados
  META_PES:36,  REAL_PES:37,  PCT_PES:38,   // Paquetá Esportes
  META_DIA:41,  REAL_DIA:42,  PCT_DIA:43,   // Diadora OUT
};

const OK="#16a34a",WARN="#d97706",ERR="#dc2626",PRI="#B91C1C";
const CORES=["#6366f1","#f59e0b","#22d3ee","#10b981","#f43f5e","#a78bfa","#34d399","#fb923c"];
let CH={};

const R=v=>new Intl.NumberFormat("pt-BR",{style:"currency",currency:"BRL",minimumFractionDigits:0,maximumFractionDigits:0}).format(v||0);
const P=v=>`${Number(v||0).toFixed(1)}%`;
const COR=p=>p>=100?OK:p>=70?WARN:ERR;

function $BRL(v){
  if(!v)return 0;
  return parseFloat(String(v).replace(/[R$\s]/g,"").replace(/\./g,"").replace(",","."))||0;
}
function $PCT(v){
  if(!v)return 0;
  let n=parseFloat(String(v).replace(/[%\s]/g,"").replace(",","."))||0;
  return(n>0&&n<=1)?n*100:n;
}
function isJun(v){
  if(!v)return false;
  const s=String(v).trim();
  if(s.match(/^\d{2}\/\d{2}\/\d{4}$/))return s.slice(3,5)==="06"&&s.slice(6)==="2026";
  if(s.match(/^\d{2}\/\d{2}\/\d{2}$/))return s.slice(3,5)==="06"&&s.slice(6)==="26";
  return/jun/i.test(s)||s.includes("06/2026");
}

async function fetchAba(aba,range="A1:BZ600"){
  const enc=encodeURIComponent(`'${aba}'!${range}`);
  const r=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SID}/values/${enc}?key=${KEY}`);
  if(!r.ok)throw new Error(`Erro na aba "${aba}": HTTP ${r.status}`);
  const d=await r.json();
  return d.values||[];
}

function msg(m){const e=document.getElementById("lmsg");if(e)e.textContent=m;}

async function load(){
  document.getElementById("loading").style.display="flex";
  document.getElementById("main").style.display="none";
  Object.values(CH).forEach(c=>c&&c.destroy&&c.destroy());CH={};
  try{
    msg("Buscando Diarização Canal Faturamento...");
    const rawF=await fetchAba("Diarização Canal Faturamento");
    msg("Buscando Diarização Canal Vendas...");
    const rawV=await fetchAba("Diarização Canal Vendas");
    msg("Processando dados de Junho/2026...");

    // Linhas de dados começam na linha 4 (índice 3) - pula 3 linhas de cabeçalho
    const rowsF=rawF.slice(3).filter(r=>r[FC.DATA]&&String(r[FC.DATA]).match(/\d{2}\/\d{2}/));
    const rowsV=rawV.slice(3).filter(r=>r[VC.DATA]&&String(r[VC.DATA]).match(/\d{2}\/\d{2}/));

    // Filtra junho
    const junF=rowsF.filter(r=>isJun(r[FC.DATA]));
    const junV=rowsV.filter(r=>isJun(r[VC.DATA]));

    const dadosF=junF.length>0?junF:rowsF;
    const dadosV=junV.length>0?junV:rowsV;

    // Última linha com realizado > 0 (dado mais recente)
    const comR=dadosF.filter(r=>$BRL(r[FC.REAL_ACUM])>0);
    const ult=comR[comR.length-1]||dadosF[0]||[];

    // KPIs principais da última linha com dado
    const metaG  =$BRL(ult[FC.META_GERAL]);
    const realG  =$BRL(ult[FC.REAL_ACUM]);
    const pctG   =$PCT(ult[FC.PCT_ACUM])||(metaG>0?(realG/metaG)*100:0);
    const difPct =$PCT(ult[FC.DIF_PCT]);
    const vendaA =$BRL(ult[FC.VENDA_ACUM]);
    const cmvG   =$PCT(ult[FC.CMV_GERAL]);
    const cmvCD  =$PCT(ult[FC.CMV_CD]);
    const cmvL   =$PCT(ult[FC.CMV_LOJAS]);
    const margem =$PCT(ult[FC.MARGEM]);
    const ticket =$BRL(ult[FC.TICKET]);
    const data   =ult[FC.DATA]||"";

    // Evolução diária faturamento
    const evolF=dadosF.map(r=>({
      data:String(r[FC.DATA]).slice(0,5),
      meta:$BRL(r[FC.META_GERAL]),
      real:$BRL(r[FC.REAL_ACUM]),
      pct:$PCT(r[FC.PCT_ACUM]),
      cmv:$PCT(r[FC.CMV_GERAL]),
    })).filter(e=>e.meta>0||e.real>0);

    // Canal de Vendas - última linha com dado
    const comRV=dadosV.filter(r=>$BRL(r[VC.REAL_ACUM])>0);
    const ultV=comRV[comRV.length-1]||dadosV[0]||[];

    const canaisVendas=[
      {canal:"3.0 Vendas",    meta:$BRL(ultV[VC.META_30]),  real:$BRL(ultV[VC.REAL_30]),  pct:$PCT(ultV[VC.PCT_30])},
      {canal:"OUT Marketplace",meta:$BRL(ultV[VC.META_OUT]), real:$BRL(ultV[VC.REAL_OUT]), pct:$PCT(ultV[VC.PCT_OUT])},
      {canal:"App Oscar",     meta:$BRL(ultV[VC.META_APP]),  real:$BRL(ultV[VC.REAL_APP]),  pct:$PCT(ultV[VC.PCT_APP])},
      {canal:"Site Oscar",    meta:$BRL(ultV[VC.META_SITE]), real:$BRL(ultV[VC.REAL_SITE]), pct:$PCT(ultV[VC.PCT_SITE])},
      {canal:"Paquetá Calç.", meta:$BRL(ultV[VC.META_PAQ]),  real:$BRL(ultV[VC.REAL_PAQ]),  pct:$PCT(ultV[VC.PCT_PAQ])},
      {canal:"Paquetá Esp.",  meta:$BRL(ultV[VC.META_PES]),  real:$BRL(ultV[VC.REAL_PES]),  pct:$PCT(ultV[VC.PCT_PES])},
      {canal:"Diadora OUT",   meta:$BRL(ultV[VC.META_DIA]),  real:$BRL(ultV[VC.REAL_DIA]),  pct:$PCT(ultV[VC.PCT_DIA])},
    ].map(c=>({...c,gap:c.real-c.meta,pct:c.pct||(c.meta>0?(c.real/c.meta)*100:0)}))
     .filter(c=>c.meta>0||c.real>0);

    // Evolução vendas
    const evolV=dadosV.map(r=>({
      data:String(r[VC.DATA]).slice(0,5),
      meta:$BRL(r[VC.META_GERAL]),
      real:$BRL(r[VC.REAL_ACUM]),
      pct:$PCT(r[VC.PCT_ACUM]),
    })).filter(e=>e.meta>0||e.real>0);

    render({data,metaG,realG,pctG,difPct,vendaA,cmvG,cmvCD,cmvL,margem,ticket,evolF,evolV,canaisVendas,dadosF});
  }catch(e){
    document.getElementById("loading").style.display="none";
    document.getElementById("main").style.display="block";
    document.getElementById("main").innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;padding:20px;text-align:center">
      <div style="font-size:40px">⚠️</div>
      <div style="color:#f87171;font-size:15px;font-weight:700">Erro ao carregar dados</div>
      <div style="color:#94a3b8;font-size:13px;max-width:460px;line-height:1.6">${e.message}</div>
      <button class="btn" onclick="load()">↻ Tentar novamente</button></div>`;
  }
}

function kpi(ic,lb,vl,sb,pt,cr){
  const c=cr||(pt!==undefined?COR(pt):"#e2e8f0");
  return`<div class="kpi">
    <div style="font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">${ic} ${lb}</div>
    <div style="font-size:24px;font-weight:800;color:${c};line-height:1.1">${vl}</div>
    ${sb?`<div style="font-size:12px;color:#64748b;margin-top:4px">${sb}</div>`:""}
    ${pt!==undefined?`<div style="display:flex;justify-content:space-between;font-size:11px;color:#64748b;margin-top:8px"><span>Atingimento</span><span style="color:${COR(pt)};font-weight:700">${P(pt)}</span></div>
    <div style="background:rgba(255,255,255,0.08);border-radius:99px;height:6px;margin-top:3px"><div style="width:${Math.min(pt,100)}%;height:6px;border-radius:99px;background:${COR(pt)}"></div></div>`:""}
  </div>`;
}

function cCard(c){
  const cor=COR(c.pct);
  return`<div style="background:rgba(255,255,255,0.04);border:1px solid ${cor}33;border-radius:14px;padding:16px 18px">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
      <div style="font-size:13px;font-weight:700;color:#e2e8f0">${c.canal}</div>
      <div style="font-size:20px;font-weight:800;color:${cor}">${P(c.pct)}</div>
    </div>
    <div style="display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap">
      <div><div style="font-size:10px;color:#64748b">META</div><div style="font-size:12px;font-weight:600;color:#94a3b8">${R(c.meta)}</div></div>
      <div><div style="font-size:10px;color:#64748b">REALIZADO</div><div style="font-size:12px;font-weight:600;color:#e2e8f0">${R(c.real)}</div></div>
      <div><div style="font-size:10px;color:#64748b">GAP</div><div style="font-size:12px;font-weight:600;color:${c.gap>=0?OK:ERR}">${c.gap>=0?"+":""}${R(c.gap)}</div></div>
    </div>
    <div style="background:rgba(255,255,255,0.06);border-radius:99px;height:5px"><div style="width:${Math.min(c.pct,100)}%;height:5px;border-radius:99px;background:${cor}"></div></div>
  </div>`;
}

function render(d){
  const hoje=new Date().toLocaleDateString("pt-BR");
  const {data,metaG,realG,pctG,difPct,vendaA,cmvG,cmvCD,cmvL,margem,ticket,evolF,evolV,canaisVendas,dadosF}=d;
  const falta=metaG-realG;
  const crit=canaisVendas.filter(c=>c.pct<50);
  const atenc=canaisVendas.filter(c=>c.pct>=50&&c.pct<80);
  const dest=canaisVendas.filter(c=>c.pct>=100);

  const PAGT=[
    {name:"Cartão Crédito",pct:37.09,cor:CORES[0]},
    {name:"FestCard",pct:26.06,cor:CORES[1]},
    {name:"Pix",pct:22.28,cor:CORES[2]},
    {name:"Credsystem",pct:5.01,cor:CORES[3]},
    {name:"Vale",pct:3.11,cor:CORES[4]},
    {name:"Outros",pct:6.45,cor:CORES[5]},
  ];

  document.getElementById("main").innerHTML=`
  <div class="topo">
    <div>
      <div class="titulo">📊 Dashboard E-commerce · Grupo Oscar</div>
      <div class="sub">Ref. ${data} · Junho/2026 · Atualizado ${hoje}</div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <span class="badge badge-g">✓ Google Sheets Live</span>
      <span class="badge badge-b">📅 Jun/26</span>
      <button class="btn" onclick="load()">↻ Atualizar</button>
    </div>
  </div>

  <div class="tab-row">
    <button class="tab on"  id="tb-fat"  onclick="tab('fat')">📈 Faturamento</button>
    <button class="tab off" id="tb-vend" onclick="tab('vend')">🏪 Canal Vendas</button>
    <button class="tab off" id="tb-marg" onclick="tab('marg')">💰 Margem</button>
    <button class="tab off" id="tb-pag"  onclick="tab('pag')">💳 Pagamento</button>
    <button class="tab off" id="tb-tab"  onclick="tab('tab')">📋 Tabela</button>
  </div>

  <div class="alerta">
    <div style="font-size:13px;font-weight:700;color:#fca5a5;margin-bottom:10px">🔔 Inteligência do Dia · ${data}</div>
    <div style="display:flex;flex-wrap:wrap;gap:20px">
      ${crit.length?`<div><div style="color:#f87171;font-weight:700;font-size:11px;margin-bottom:4px">🚨 CRÍTICO — abaixo de 50%</div>${crit.map(c=>`<div style="color:#fca5a5;font-size:12px;line-height:1.8">• ${c.canal}: ${P(c.pct)} (gap ${R(c.gap)})</div>`).join("")}</div>`:""}
      ${atenc.length?`<div><div style="color:#fbbf24;font-weight:700;font-size:11px;margin-bottom:4px">⚠️ ATENÇÃO — 50% a 80%</div>${atenc.map(c=>`<div style="color:#fde68a;font-size:12px;line-height:1.8">• ${c.canal}: ${P(c.pct)}</div>`).join("")}</div>`:""}
      ${dest.length?`<div><div style="color:#4ade80;font-weight:700;font-size:11px;margin-bottom:4px">✅ ACIMA DA META</div>${dest.map(c=>`<div style="color:#86efac;font-size:12px;line-height:1.8">• ${c.canal}: ${P(c.pct)}</div>`).join("")}</div>`:""}
      ${!crit.length&&!atenc.length&&!dest.length?`<div style="color:#94a3b8;font-size:12px">Carregando análise dos canais...</div>`:""}
    </div>
  </div>

  <!-- FATURAMENTO -->
  <div class="sec on" id="s-fat">
    <div class="sl">Faturamento · Acumulado até ${data}</div>
    <div class="g3">
      ${kpi("🎯","GMV Realizado",R(realG),`Meta: ${R(metaG)}`,pctG)}
      ${kpi("⚡","Falta para Meta",R(Math.abs(falta)),falta<=0?"🟢 Meta batida!":"Restante p/ 100%",undefined,falta<=0?OK:ERR)}
      ${kpi("📊","% Atingimento",P(pctG),`Gap: ${P(difPct)}`,undefined,COR(pctG))}
      ${kpi("💹","Venda Acumulada",R(vendaA),"Tendência regressão",undefined,"#a5b4fc")}
      ${ticket>0?kpi("🎫","Ticket Médio",R(ticket),"Valor médio do pedido",undefined,"#f59e0b"):""}
      ${kpi("📦","Meta Total Mês",R(metaG),"Meta junho/2026",undefined,"#64748b")}
    </div>
    <div class="sl">Evolução Diária · Faturamento Junho</div>
    <div class="card"><div style="height:240px"><canvas id="cEvF"></canvas></div></div>
    <div class="sl">% Atingimento Diário</div>
    <div class="card"><div style="height:200px"><canvas id="cPctF"></canvas></div></div>
  </div>

  <!-- CANAL VENDAS -->
  <div class="sec" id="s-vend">
    <div class="sl">Ranking por Canal · Acumulado até ${data}</div>
    <div class="card"><div style="height:${Math.max(canaisVendas.length*50+40,200)}px"><canvas id="cRank"></canvas></div></div>
    <div class="sl">Performance Detalhada por Canal</div>
    <div class="g2">${canaisVendas.map(cCard).join("")}</div>
    <div class="sl">Evolução Diária · Canal Vendas</div>
    <div class="card"><div style="height:220px"><canvas id="cEvV"></canvas></div></div>
  </div>

  <!-- MARGEM -->
  <div class="sec" id="s-marg">
    <div class="sl">CMV · Margem Bruta · Ref. ${data}</div>
    <div class="g3">
      ${[{l:"Geral",cmv:cmvG||42.43},{l:"CD",cmv:cmvCD||42.54},{l:"Lojas",cmv:cmvL||42.40}].map(m=>`
      <div class="kpi">
        <div style="font-size:12px;font-weight:700;color:#e2e8f0;margin-bottom:12px">${m.l}</div>
        <div style="display:flex;gap:16px;margin-bottom:12px">
          <div><div style="font-size:10px;color:#64748b">CMV</div><div style="font-size:22px;font-weight:800;color:${ERR}">${P(m.cmv)}</div></div>
          <div><div style="font-size:10px;color:#64748b">MARGEM BRUTA</div><div style="font-size:22px;font-weight:800;color:${OK}">${P(100-m.cmv)}</div></div>
        </div>
        <div style="background:rgba(255,255,255,0.06);border-radius:99px;height:8px;overflow:hidden">
          <div style="width:${100-m.cmv}%;height:100%;background:${OK};border-radius:99px"></div>
        </div>
      </div>`).join("")}
    </div>
    <div class="sl">CMV vs Margem por Canal</div>
    <div class="card"><div style="height:220px"><canvas id="cMarg"></canvas></div></div>
    <div class="sl">Evolução CMV Diária</div>
    <div class="card"><div style="height:200px"><canvas id="cCMV"></canvas></div></div>
  </div>

  <!-- PAGAMENTO -->
  <div class="sec" id="s-pag">
    <div class="sl">Mix de Meios de Pagamento</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px">
      <div class="card" style="margin-bottom:0"><div style="height:280px"><canvas id="cPag"></canvas></div></div>
      <div>
        ${PAGT.map(p=>`<div style="display:flex;align-items:center;gap:12px;background:rgba(255,255,255,0.03);border-radius:10px;padding:12px 16px;margin-bottom:10px">
          <div style="width:12px;height:12px;border-radius:50%;background:${p.cor};flex-shrink:0"></div>
          <div style="flex:1;font-size:13px;color:#e2e8f0">${p.name}</div>
          <div style="font-size:16px;font-weight:700;color:${p.cor}">${p.pct}%</div>
          <div style="width:80px;background:rgba(255,255,255,0.06);border-radius:99px;height:5px">
            <div style="width:${p.pct}%;height:5px;border-radius:99px;background:${p.cor}"></div>
          </div>
        </div>`).join("")}
        <div style="background:rgba(99,102,241,0.08);border:1px solid rgba(99,102,241,0.2);border-radius:10px;padding:12px 16px;font-size:12px;color:#a5b4fc;margin-top:4px;line-height:1.6">
          💡 <strong>Cartão + FestCard</strong> = <strong>63,15%</strong> dos pagamentos<br>Pix em 3º com <strong>22,28%</strong>
        </div>
      </div>
    </div>
  </div>

  <!-- TABELA -->
  <div class="sec" id="s-tab">
    <div class="sl">Diarização Canal Faturamento · Junho 2026 · ${evolF.length} dias</div>
    <div style="overflow-x:auto;border-radius:12px;border:1px solid rgba(255,255,255,0.07)">
      <table class="t">
        <thead><tr><th>Data</th><th>Meta Diária</th><th>Realizado Acum.</th><th>% Atingido</th><th>GAP R$</th><th>CMV</th></tr></thead>
        <tbody>${evolF.map(e=>{const g=e.real-e.meta;return`<tr>
          <td>${e.data}</td>
          <td>${R(e.meta)}</td>
          <td>${R(e.real)}</td>
          <td style="color:${COR(e.pct)};font-weight:700">${P(e.pct)}</td>
          <td style="color:${g>=0?OK:ERR}">${g>=0?"+":""}${R(g)}</td>
          <td>${e.cmv>0?P(e.cmv):"-"}</td>
        </tr>`;}).join("")}</tbody>
      </table>
    </div>
  </div>

  <div class="rodape">Dashboard E-commerce · Grupo Oscar · Google Sheets Live · ${hoje}</div>`;

  document.getElementById("loading").style.display="none";
  document.getElementById("main").style.display="block";

  const BO={responsive:true,maintainAspectRatio:false,
    plugins:{legend:{labels:{color:"#94a3b8",font:{size:11}}},tooltip:{backgroundColor:"#1e293b",borderColor:"#334155",borderWidth:1,titleColor:"#e2e8f0",bodyColor:"#94a3b8"}},
    scales:{x:{ticks:{color:"#64748b",font:{size:10}},grid:{color:"#1e293b"}},y:{ticks:{color:"#64748b",font:{size:10}},grid:{color:"#1e293b"}}}};

  // Evolução faturamento
  if(evolF.length>0){
    CH.evF=new Chart(document.getElementById("cEvF"),{type:"bar",
      data:{labels:evolF.map(e=>e.data),datasets:[
        {label:"Meta",data:evolF.map(e=>e.meta),backgroundColor:"#334155",borderRadius:3},
        {label:"Realizado",data:evolF.map(e=>e.real),backgroundColor:PRI,borderRadius:3}
      ]},options:{...BO,scales:{...BO.scales,y:{...BO.scales.y,ticks:{...BO.scales.y.ticks,callback:v=>R(v)}}}}});
    // % diário
    CH.pctF=new Chart(document.getElementById("cPctF"),{type:"line",
      data:{labels:evolF.map(e=>e.data),datasets:[
        {label:"% Atingimento",data:evolF.map(e=>e.pct),borderColor:"#6366f1",backgroundColor:"rgba(99,102,241,0.1)",tension:.4,fill:true,pointRadius:3},
        {label:"Meta 100%",data:evolF.map(()=>100),borderColor:"#334155",borderDash:[5,5],pointRadius:0}
      ]},options:{...BO,scales:{...BO.scales,y:{...BO.scales.y,ticks:{...BO.scales.y.ticks,callback:v=>`${v}%`}}}}});
  }

  // Ranking canais
  if(canaisVendas.length>0){
    const sorted=[...canaisVendas].sort((a,b)=>b.pct-a.pct);
    CH.rank=new Chart(document.getElementById("cRank"),{type:"bar",
      data:{labels:sorted.map(c=>c.canal),datasets:[{label:"% Atingido",data:sorted.map(c=>+c.pct.toFixed(1)),backgroundColor:sorted.map(c=>COR(c.pct)),borderRadius:4}]},
      options:{...BO,indexAxis:"y",scales:{x:{...BO.scales.x,ticks:{...BO.scales.x.ticks,callback:v=>`${v}%`}},y:{...BO.scales.y,ticks:{color:"#94a3b8",font:{size:11}}}}}});
    // Evolução vendas
    if(evolV.length>0){
      CH.evV=new Chart(document.getElementById("cEvV"),{type:"bar",
        data:{labels:evolV.map(e=>e.data),datasets:[
          {label:"Meta",data:evolV.map(e=>e.meta),backgroundColor:"#334155",borderRadius:3},
          {label:"Realizado",data:evolV.map(e=>e.real),backgroundColor:"#22d3ee",borderRadius:3}
        ]},options:{...BO,scales:{...BO.scales,y:{...BO.scales.y,ticks:{...BO.scales.y.ticks,callback:v=>R(v)}}}}});
    }
  }

  // Margem
  const mD=[{l:"Geral",cmv:cmvG||42.43},{l:"CD",cmv:cmvCD||42.54},{l:"Lojas",cmv:cmvL||42.40}];
  CH.marg=new Chart(document.getElementById("cMarg"),{type:"bar",
    data:{labels:mD.map(m=>m.l),datasets:[
      {label:"CMV",data:mD.map(m=>m.cmv),backgroundColor:ERR,borderRadius:4},
      {label:"Margem Bruta",data:mD.map(m=>+(100-m.cmv).toFixed(2)),backgroundColor:OK,borderRadius:4}
    ]},options:{...BO,scales:{...BO.scales,y:{...BO.scales.y,max:100,ticks:{...BO.scales.y.ticks,callback:v=>`${v}%`}}}}});
  // CMV diário
  const cmvDia=evolF.filter(e=>e.cmv>0);
  if(cmvDia.length>0){
    CH.cmv=new Chart(document.getElementById("cCMV"),{type:"line",
      data:{labels:cmvDia.map(e=>e.data),datasets:[{label:"CMV Diário %",data:cmvDia.map(e=>e.cmv),borderColor:ERR,backgroundColor:"rgba(220,38,38,0.1)",tension:.4,fill:true,pointRadius:3}]},
      options:{...BO,scales:{...BO.scales,y:{...BO.scales.y,ticks:{...BO.scales.y.ticks,callback:v=>`${v}%`}}}}});
  }

  // Pagamento
  CH.pag=new Chart(document.getElementById("cPag"),{type:"doughnut",
    data:{labels:PAGT.map(p=>p.name),datasets:[{data:PAGT.map(p=>p.pct),backgroundColor:PAGT.map(p=>p.cor),borderColor:"#0a0f1e",borderWidth:2}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"bottom",labels:{color:"#94a3b8",font:{size:11},padding:12}},tooltip:{backgroundColor:"#1e293b",borderColor:"#334155",borderWidth:1,callbacks:{label:ctx=>`${ctx.label}: ${ctx.parsed}%`}}}}});
}

function tab(t){
  ["fat","vend","marg","pag","tab"].forEach(s=>{
    document.getElementById(`s-${s}`).className="sec"+(s===t?" on":"");
    document.getElementById(`tb-${s}`).className="tab "+(s===t?"on":"off");
  });
  setTimeout(()=>Object.values(CH).forEach(c=>c&&c.resize&&c.resize()),50);
}

function auth(){
  if(document.getElementById("pwd").value==="oscar@ecom26"){
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
    sessionStorage.setItem("ok","1");
    load();
  }else{
    document.getElementById("erropwd").style.display="block";
    document.getElementById("pwd").value="";
    document.getElementById("pwd").focus();
  }
}
if(sessionStorage.getItem("ok")==="1"){
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
  load();
}
</script>
</body>
</html>
